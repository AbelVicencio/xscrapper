<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Content Scraper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
      width: 300px; /* Más estrecho */
      min-height: 180px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1d9bf0 0%, #0d8bd9 100%);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* Master Switch Styles */
    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255,255,255,0.3);
      transition: .4s;
      border-radius: 18px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 2px; bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #00ba7c; }
    input:checked + .slider:before { transform: translateX(14px); }

    .header-icon {
      font-size: 18px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .header p {
      font-size: 10px;
      color: rgba(255,255,255,0.8);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 14px;
    }

    .stat-card {
      background: #1e2d3d;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      border: 1px solid #2d3f50;
    }

    .stat-value {
      font-size: 20px; /* Más pequeño */
      font-weight: 800;
      color: #1d9bf0;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 9px;
      color: #8b98a5;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .actions {
      padding: 0 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px; /* Más compacto */
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
/* ... resto de estilos se mantienen similares pero ajustados ... */
    .btn-primary { background: #1d9bf0; color: #fff; }
    .btn-secondary { background: #1e2d3d; color: #e7e9ea; border: 1px solid #2d3f50; }
    .btn-danger { background: transparent; color: #f4212e; border: 1px solid rgba(244, 33, 46, 0.2); font-size: 11px; margin-top: 4px; }
    
    .status-bar { padding: 6px 14px; background: #0d1117; font-size: 10px; color: #8b98a5; display: flex; align-items: center; gap: 6px; }
    .status-dot { 
      display: inline-block;
      width: 8px; 
      height: 8px; 
      border-radius: 50%; 
      background: #00ba7c; 
      box-shadow: 0 0 4px #00ba7c;
      animation: pulse 2s infinite;
    }
    .status-dot.off { 
      background: #536471; 
      box-shadow: none; 
      animation: none; 
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .toast { font-size: 11px; padding: 6px 12px; }

    /* Animación de "Caza" (Pop vibrante) */
    .pop-animation {
      animation: hunter-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes hunter-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); color: #00ba7c; }
      100% { transform: scale(1); }
    }
  </style>
</head>
<!-- ... resto del HTML ... -->
<body>
  <div class="header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <span class="header-icon">🕵️‍♂️</span>
      <div>
        <h1>X Scraper</h1>
        <p id="activeStatusText">Cargando...</p>
      </div>
    </div>
    <label class="switch">
      <input type="checkbox" id="chkActive" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="totalPosts">—</div>
      <div class="stat-label">Posts</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="lastExport" style="font-size: 14px;">—</div>
      <div class="stat-label">Exportado</div>
    </div>
  </div>

  <div class="actions">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
      <button class="btn btn-primary" id="btnExport">
        📁 JSON
      </button>
      <button class="btn btn-primary" id="btnExportCSV" style="background: #00ba7c;">
        📊 CSV
      </button>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
      <button class="btn btn-secondary" id="btnLoad">
        📥 Cargar
      </button>
      <button class="btn btn-secondary" id="btnScan">
        🔎 Escanear
      </button>
    </div>
    <button class="btn btn-secondary" id="btnAutoscroll" style="border-color: #1d9bf0; color: #1d9bf0;">
      🚀 Autoscroll
    </button>
    <input type="file" id="fileInput" accept=".json" style="display: none;">
    <button class="btn btn-danger" id="btnClear">
      🗑️ Borrar todo
    </button>
  </div>

  <div class="status-bar">
    <span class="status-dot"></span>
    <span id="statusText">Observando cambios...</span>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../../dist/popup.js"></script>
</body>
</html>
